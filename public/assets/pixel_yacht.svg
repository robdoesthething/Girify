<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" shape-rendering="crispEdges">
  <!-- YACHT — side-profile pixel art, transparent sky -->

  <!-- Mast -->
  <rect x="148" y="18" width="8" height="148" fill="#64748b"/>
  <rect x="146" y="18" width="4" height="120" fill="#94a3b8"/>

  <!-- Flag (Barcelona red/yellow) -->
  <rect x="156" y="18" width="36" height="12" fill="#ef4444"/>
  <rect x="156" y="30" width="36" height="10" fill="#fbbf24"/>
  <!-- Flag pole connection -->
  <rect x="156" y="18" width="4" height="22" fill="#dc2626"/>

  <!-- Radar mast on bridge -->
  <rect x="192" y="74" width="4" height="20" fill="#475569"/>
  <rect x="182" y="70" width="24" height="6" fill="#64748b"/>
  <rect x="192" y="64" width="4" height="10" fill="#475569"/>
  <!-- Radar tip (blinking) -->
  <rect x="191" y="62" width="6" height="4" fill="#ef4444"/>

  <!-- Bridge / wheelhouse -->
  <rect x="116" y="82" width="82" height="36" fill="#e2e8f0"/>
  <rect x="116" y="82" width="82" height="10" fill="#f8fafc"/>
  <rect x="112" y="86" width="8" height="32" fill="#cbd5e1"/>
  <rect x="116" y="114" width="82" height="4" fill="#94a3b8"/>
  <!-- Bridge windows (3) -->
  <rect x="124" y="88" width="18" height="16" fill="#38bdf8"/>
  <rect x="124" y="88" width="18" height="6" fill="#7dd3fc"/>
  <rect x="146" y="88" width="18" height="16" fill="#38bdf8"/>
  <rect x="146" y="88" width="18" height="6" fill="#7dd3fc"/>
  <rect x="168" y="88" width="18" height="16" fill="#38bdf8"/>
  <rect x="168" y="88" width="18" height="6" fill="#7dd3fc"/>

  <!-- Main cabin -->
  <rect x="60" y="118" width="164" height="40" fill="#f1f5f9"/>
  <rect x="60" y="118" width="164" height="10" fill="#f8fafc"/>
  <rect x="56" y="122" width="8" height="36" fill="#cbd5e1"/>
  <rect x="60" y="150" width="164" height="8" fill="#94a3b8"/>
  <!-- Cabin windows (4) -->
  <rect x="72" y="124" width="22" height="16" fill="#38bdf8"/>
  <rect x="72" y="124" width="22" height="6" fill="#7dd3fc"/>
  <rect x="100" y="124" width="22" height="16" fill="#38bdf8"/>
  <rect x="100" y="124" width="22" height="6" fill="#7dd3fc"/>
  <rect x="128" y="124" width="22" height="16" fill="#38bdf8"/>
  <rect x="128" y="124" width="22" height="6" fill="#7dd3fc"/>
  <rect x="158" y="124" width="22" height="16" fill="#38bdf8"/>
  <rect x="158" y="124" width="22" height="6" fill="#7dd3fc"/>

  <!-- Deck railing line -->
  <rect x="36" y="158" width="204" height="6" fill="#475569"/>
  <rect x="38" y="158" width="200" height="2" fill="#64748b"/>

  <!-- HULL main body -->
  <rect x="36" y="164" width="204" height="26" fill="#f8fafc"/>
  <rect x="36" y="164" width="204" height="8" fill="#e2e8f0"/>
  <!-- Waterline stripe (dark navy) -->
  <rect x="36" y="182" width="204" height="8" fill="#1e3a5f"/>
  <rect x="36" y="184" width="204" height="2" fill="#1d4ed8" opacity="0.4"/>

  <!-- Hull bow (pointed front-left) -->
  <rect x="22" y="168" width="18" height="22" fill="#f1f5f9"/>
  <rect x="12" y="174" width="14" height="16" fill="#e2e8f0"/>
  <rect x="6" y="180" width="10" height="10" fill="#cbd5e1"/>

  <!-- Hull stern (right) -->
  <rect x="238" y="164" width="12" height="26" fill="#e2e8f0"/>
  <rect x="246" y="166" width="4" height="22" fill="#cbd5e1"/>

  <!-- Portholes (seven) -->
  <rect x="48" y="168" width="12" height="8" fill="#93c5fd"/>
  <rect x="72" y="168" width="12" height="8" fill="#93c5fd"/>
  <rect x="96" y="168" width="12" height="8" fill="#93c5fd"/>
  <rect x="120" y="168" width="12" height="8" fill="#93c5fd"/>
  <rect x="144" y="168" width="12" height="8" fill="#93c5fd"/>
  <rect x="168" y="168" width="12" height="8" fill="#93c5fd"/>
  <rect x="204" y="168" width="12" height="8" fill="#93c5fd"/>

  <!-- WATER surface shine -->
  <rect x="0" y="190" width="256" height="8" fill="#38bdf8"/>
  <!-- Main water body -->
  <rect x="0" y="198" width="256" height="28" fill="#0ea5e9"/>
  <!-- Deep water -->
  <rect x="0" y="226" width="256" height="30" fill="#0284c7"/>

  <!-- Wake / foam (left, where bow cuts water) -->
  <rect x="4" y="192" width="36" height="4" fill="#bae6fd" opacity="0.8"/>
  <rect x="0" y="196" width="44" height="4" fill="#bae6fd" opacity="0.5"/>

  <!-- Wave detail strips -->
  <rect x="20" y="204" width="22" height="4" fill="#7dd3fc"/>
  <rect x="58" y="210" width="30" height="4" fill="#38bdf8"/>
  <rect x="106" y="206" width="18" height="4" fill="#7dd3fc"/>
  <rect x="152" y="212" width="26" height="4" fill="#38bdf8"/>
  <rect x="198" y="207" width="20" height="4" fill="#7dd3fc"/>
  <rect x="230" y="213" width="16" height="4" fill="#38bdf8"/>

  <!-- Hull reflection in water -->
  <rect x="36" y="198" width="204" height="4" fill="#bae6fd" opacity="0.2"/>
</svg>
