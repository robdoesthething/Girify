<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" shape-rendering="crispEdges">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#0f172a"/>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#1e3a5f" stroke-width="6"/>

  <!-- Antenna tip (red LED) -->
  <rect x="118" y="14" width="20" height="14" fill="#ef4444"/>
  <rect x="120" y="12" width="16" height="4" fill="#fca5a5"/>
  <!-- Antenna shaft -->
  <rect x="124" y="28" width="8" height="26" fill="#64748b"/>
  <rect x="122" y="28" width="4" height="26" fill="#94a3b8"/>
  <!-- Antenna base bar -->
  <rect x="104" y="50" width="48" height="8" fill="#334155"/>
  <rect x="106" y="50" width="44" height="4" fill="#475569"/>

  <!-- Left ear bolt -->
  <rect x="46" y="84" width="20" height="20" fill="#1e293b"/>
  <rect x="50" y="88" width="12" height="12" fill="#475569"/>
  <rect x="53" y="91" width="6" height="6" fill="#60a5fa"/>

  <!-- Right ear bolt -->
  <rect x="190" y="84" width="20" height="20" fill="#1e293b"/>
  <rect x="194" y="88" width="12" height="12" fill="#475569"/>
  <rect x="197" y="91" width="6" height="6" fill="#60a5fa"/>

  <!-- Head shadow -->
  <rect x="58" y="58" width="140" height="136" fill="#1e293b"/>
  <!-- Head body (metal) -->
  <rect x="62" y="62" width="132" height="128" fill="#475569"/>
  <!-- Head top highlight strip -->
  <rect x="62" y="62" width="132" height="14" fill="#64748b"/>
  <!-- Head top specular -->
  <rect x="70" y="62" width="60" height="6" fill="#94a3b8"/>

  <!-- Forehead panel (dark inset) -->
  <rect x="72" y="76" width="112" height="22" fill="#0f172a"/>
  <!-- Panel inner line -->
  <rect x="74" y="78" width="108" height="18" fill="#020617"/>
  <!-- Status LEDs -->
  <rect x="80" y="82" width="10" height="10" fill="#22c55e"/>
  <rect x="94" y="82" width="10" height="10" fill="#22c55e"/>
  <rect x="108" y="82" width="10" height="10" fill="#fbbf24"/>
  <rect x="152" y="82" width="10" height="10" fill="#ef4444"/>
  <rect x="166" y="82" width="10" height="10" fill="#22c55e"/>
  <!-- LED glows -->
  <rect x="78" y="80" width="14" height="14" fill="#22c55e" opacity="0.25"/>
  <rect x="150" y="80" width="14" height="14" fill="#ef4444" opacity="0.25"/>

  <!-- Panel to face separator -->
  <rect x="62" y="98" width="132" height="8" fill="#1e293b"/>

  <!-- Left eye socket -->
  <rect x="72" y="106" width="48" height="42" fill="#081020"/>
  <!-- Left eye glow rings (concentric) -->
  <rect x="76" y="110" width="40" height="34" fill="#1e40af"/>
  <rect x="80" y="114" width="32" height="26" fill="#2563eb"/>
  <rect x="84" y="118" width="24" height="18" fill="#3b82f6"/>
  <rect x="88" y="122" width="16" height="10" fill="#38bdf8"/>
  <rect x="92" y="126" width="8" height="2" fill="#e0f2fe"/>
  <!-- Left eye pixel highlight (top-left corner) -->
  <rect x="82" y="116" width="8" height="6" fill="#bae6fd"/>

  <!-- Right eye socket -->
  <rect x="136" y="106" width="48" height="42" fill="#081020"/>
  <!-- Right eye glow rings -->
  <rect x="140" y="110" width="40" height="34" fill="#1e40af"/>
  <rect x="144" y="114" width="32" height="26" fill="#2563eb"/>
  <rect x="148" y="118" width="24" height="18" fill="#3b82f6"/>
  <rect x="152" y="122" width="16" height="10" fill="#38bdf8"/>
  <rect x="156" y="126" width="8" height="2" fill="#e0f2fe"/>
  <!-- Right eye highlight -->
  <rect x="146" y="116" width="8" height="6" fill="#bae6fd"/>

  <!-- Eye glow bleed (ambient under eyes) -->
  <rect x="72" y="148" width="48" height="6" fill="#38bdf8" opacity="0.18"/>
  <rect x="136" y="148" width="48" height="6" fill="#38bdf8" opacity="0.18"/>

  <!-- Between-eyes nose bridge -->
  <rect x="120" y="118" width="16" height="36" fill="#475569"/>
  <!-- Nose indicator LED -->
  <rect x="122" y="142" width="12" height="8" fill="#1e293b"/>
  <rect x="124" y="144" width="8" height="4" fill="#7dd3fc"/>

  <!-- Grill background -->
  <rect x="70" y="158" width="116" height="24" fill="#0f172a"/>
  <rect x="72" y="160" width="112" height="20" fill="#020617"/>
  <!-- Grill bars (alternating cyan/dark) -->
  <rect x="76" y="162" width="10" height="16" fill="#0ea5e9"/>
  <rect x="90" y="162" width="10" height="16" fill="#1e293b"/>
  <rect x="104" y="162" width="10" height="16" fill="#0ea5e9"/>
  <rect x="118" y="162" width="10" height="16" fill="#1e293b"/>
  <rect x="132" y="162" width="10" height="16" fill="#0ea5e9"/>
  <rect x="146" y="162" width="10" height="16" fill="#1e293b"/>
  <rect x="160" y="162" width="10" height="16" fill="#0ea5e9"/>
  <rect x="174" y="162" width="8" height="16" fill="#1e293b"/>

  <!-- Chin -->
  <rect x="62" y="182" width="132" height="8" fill="#334155"/>
  <rect x="62" y="188" width="132" height="2" fill="#1e293b"/>
</svg>
