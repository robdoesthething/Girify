<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" shape-rendering="crispEdges">
  <!-- EIXAMPLE DRAGONS — circular sports badge, pixel art dragon -->

  <!-- ── BADGE RING (crimson-red) ── -->
  <circle cx="128" cy="128" r="126" fill="#7f1d1d"/>
  <circle cx="128" cy="128" r="119" fill="#991b1b"/>
  <circle cx="128" cy="128" r="112" fill="#b91c1c"/>
  <circle cx="128" cy="128" r="106" fill="#dc2626"/>
  <circle cx="128" cy="128" r="100" fill="#ef4444"/>
  <!-- Inner playing field -->
  <circle cx="128" cy="128" r="95"  fill="#0f0000"/>

  <!-- ── TEAM NAME TEXT ── -->
  <text x="128" y="50"
        font-family="'Arial Black', Impact, 'Helvetica Neue', sans-serif"
        font-size="11" font-weight="900" text-anchor="middle"
        fill="#fff5f5" letter-spacing="5">EIXAMPLE</text>
  <text x="128" y="218"
        font-family="'Arial Black', Impact, 'Helvetica Neue', sans-serif"
        font-size="20" font-weight="900" text-anchor="middle"
        fill="#fff5f5" letter-spacing="2">DRAGONS</text>

  <!-- ── WING MEMBRANE (behind body) ── -->
  <rect x="24"  y="108" width="28" height="74" fill="#052e16"/>
  <rect x="26"  y="110" width="24" height="70" fill="#0f4c24"/>
  <rect x="28"  y="112" width="20" height="66" fill="#14532d"/>
  <rect x="30"  y="114" width="16" height="60" fill="#166534"/>
  <!-- Wing ribs -->
  <rect x="24"  y="108" width="6"  height="60" fill="#052e16"/>
  <rect x="32"  y="112" width="4"  height="46" fill="#052e16"/>
  <rect x="38"  y="116" width="4"  height="34" fill="#052e16"/>
  <rect x="44"  y="120" width="4"  height="24" fill="#052e16"/>

  <!-- ── NECK (connects head to body) ── -->
  <rect x="52"  y="118" width="32" height="54" fill="#052e16"/>
  <rect x="54"  y="120" width="28" height="50" fill="#15803d"/>
  <rect x="56"  y="122" width="20" height="46" fill="#22c55e"/>
  <!-- Neck underbelly -->
  <rect x="74"  y="122" width="10" height="46" fill="#f59e0b"/>
  <rect x="76"  y="124" width="6"  height="42" fill="#fbbf24"/>

  <!-- ── BODY / CHEST ── -->
  <rect x="42"  y="164" width="94" height="54" fill="#052e16"/>
  <rect x="44"  y="166" width="90" height="50" fill="#15803d"/>
  <!-- Upper chest highlight -->
  <rect x="48"  y="168" width="70" height="18" fill="#22c55e"/>
  <rect x="52"  y="170" width="46" height="8"  fill="#4ade80"/>
  <!-- Belly scales (yellow) -->
  <rect x="58"  y="184" width="62" height="32" fill="#f59e0b"/>
  <rect x="60"  y="186" width="54" height="26" fill="#fbbf24"/>
  <!-- Scale ridge lines -->
  <rect x="60"  y="194" width="52" height="4"  fill="#d97706"/>
  <rect x="60"  y="202" width="52" height="4"  fill="#d97706"/>
  <rect x="60"  y="210" width="52" height="4"  fill="#d97706"/>

  <!-- ── HORN (top, swept back) ── -->
  <rect x="76"  y="34"  width="10" height="8"  fill="#78350f"/>
  <rect x="72"  y="42"  width="14" height="8"  fill="#92400e"/>
  <rect x="68"  y="50"  width="18" height="8"  fill="#92400e"/>
  <rect x="66"  y="58"  width="22" height="10" fill="#a16207"/>
  <rect x="64"  y="68"  width="26" height="4"  fill="#b45309"/>

  <!-- ── HEAD (dark outline first) ── -->
  <rect x="56"  y="64"  width="116" height="66" fill="#052e16"/>
  <!-- Main skull -->
  <rect x="60"  y="66"  width="110" height="62" fill="#15803d"/>
  <!-- Top highlight strip -->
  <rect x="64"  y="68"  width="90"  height="14" fill="#22c55e"/>
  <rect x="68"  y="70"  width="54"  height="6"  fill="#4ade80"/>
  <!-- Left side shadow -->
  <rect x="60"  y="66"  width="10"  height="62" fill="#14532d"/>

  <!-- Brow ridge (above eye) -->
  <rect x="88"  y="60"  width="64"  height="8"  fill="#22c55e"/>
  <rect x="90"  y="58"  width="58"  height="6"  fill="#4ade80"/>

  <!-- Spine spikes along neck/head back -->
  <rect x="62"  y="60"  width="6"   height="10" fill="#22c55e"/>
  <rect x="63"  y="58"  width="4"   height="4"  fill="#4ade80"/>
  <rect x="72"  y="58"  width="6"   height="10" fill="#22c55e"/>
  <rect x="73"  y="56"  width="4"   height="4"  fill="#4ade80"/>
  <rect x="82"  y="56"  width="6"   height="12" fill="#22c55e"/>
  <rect x="83"  y="54"  width="4"   height="6"  fill="#4ade80"/>

  <!-- ── EYE ── -->
  <!-- Socket (very dark) -->
  <rect x="90"  y="72"  width="38"  height="28" fill="#0a0a0a"/>
  <!-- Iris layers (amber/gold) -->
  <rect x="92"  y="74"  width="34"  height="24" fill="#b45309"/>
  <rect x="94"  y="76"  width="30"  height="20" fill="#d97706"/>
  <rect x="96"  y="78"  width="26"  height="16" fill="#f59e0b"/>
  <rect x="98"  y="80"  width="22"  height="12" fill="#fbbf24"/>
  <!-- Vertical slit pupil -->
  <rect x="106" y="74"  width="8"   height="24" fill="#0a0a0a"/>
  <!-- Eye shine (top-left) -->
  <rect x="92"  y="74"  width="8"   height="8"  fill="#fefce8"/>
  <rect x="94"  y="76"  width="4"   height="4"  fill="#ffffff"/>

  <!-- ── SNOUT (extends right from head) ── -->
  <rect x="166" y="66"  width="38"  height="34" fill="#052e16"/>
  <rect x="168" y="68"  width="36"  height="30" fill="#15803d"/>
  <rect x="170" y="70"  width="28"  height="10" fill="#22c55e"/>
  <!-- Snout tip / nose bump -->
  <rect x="198" y="74"  width="8"   height="20" fill="#15803d"/>
  <rect x="199" y="76"  width="6"   height="14" fill="#22c55e"/>
  <!-- Nostril slits -->
  <rect x="192" y="78"  width="8"   height="4"  fill="#052e16"/>
  <rect x="192" y="84"  width="8"   height="4"  fill="#052e16"/>

  <!-- ── UPPER JAW EDGE ── -->
  <rect x="148" y="96"  width="54"  height="6"  fill="#22c55e"/>
  <rect x="148" y="100" width="54"  height="4"  fill="#14532d"/>

  <!-- ── OPEN MOUTH (gap between jaws) ── -->
  <rect x="148" y="100" width="56"  height="14" fill="#2d0a0a"/>

  <!-- Upper teeth (pointing down into gap) -->
  <rect x="150" y="100" width="8"   height="14" fill="#f8fafc"/>
  <rect x="162" y="100" width="8"   height="14" fill="#f8fafc"/>
  <rect x="174" y="100" width="8"   height="14" fill="#f8fafc"/>
  <rect x="186" y="100" width="6"   height="14" fill="#f8fafc"/>
  <!-- Lower teeth (pointing up) -->
  <rect x="156" y="100" width="6"   height="14" fill="#e2e8f0"/>
  <rect x="168" y="100" width="6"   height="14" fill="#e2e8f0"/>
  <rect x="180" y="100" width="6"   height="14" fill="#e2e8f0"/>

  <!-- ── LOWER JAW ── -->
  <rect x="86"  y="112" width="116" height="24" fill="#052e16"/>
  <rect x="88"  y="114" width="112" height="20" fill="#15803d"/>
  <!-- Jaw underbelly (yellow) -->
  <rect x="90"  y="118" width="104" height="14" fill="#f59e0b"/>
  <rect x="92"  y="120" width="96"  height="8"  fill="#fbbf24"/>

  <!-- ── RIGHT ARM (reaching toward basketball) ── -->
  <!-- Upper arm -->
  <rect x="96"  y="192" width="54"  height="20" fill="#052e16"/>
  <rect x="98"  y="194" width="50"  height="16" fill="#15803d"/>
  <rect x="100" y="196" width="42"  height="8"  fill="#22c55e"/>
  <!-- Forearm -->
  <rect x="142" y="196" width="36"  height="18" fill="#052e16"/>
  <rect x="144" y="198" width="32"  height="14" fill="#15803d"/>
  <rect x="146" y="200" width="24"  height="6"  fill="#22c55e"/>

  <!-- Claws (3 visible, slightly spread) -->
  <rect x="174" y="192" width="8"   height="22" fill="#d1fae5"/>
  <rect x="174" y="212" width="6"   height="8"  fill="#a7f3d0"/>
  <rect x="182" y="188" width="8"   height="24" fill="#d1fae5"/>
  <rect x="182" y="210" width="6"   height="8"  fill="#a7f3d0"/>
  <rect x="190" y="190" width="8"   height="22" fill="#d1fae5"/>
  <rect x="190" y="210" width="6"   height="6"  fill="#a7f3d0"/>

  <!-- ── BASKETBALL ── -->
  <!-- Shadow -->
  <circle cx="184" cy="186" r="25"  fill="#7c2d12" opacity="0.5"/>
  <!-- Main ball -->
  <circle cx="182" cy="183" r="24"  fill="#f97316"/>
  <!-- Highlight cap (top-left) -->
  <circle cx="177" cy="178" r="14"  fill="#fb923c"/>
  <circle cx="173" cy="175" r="6"   fill="#fdba74"/>
  <!-- Vertical seam -->
  <rect x="180"  y="159" width="4"  height="48" fill="#1c1917"/>
  <!-- Horizontal seam -->
  <rect x="158"  y="181" width="48" height="4"  fill="#1c1917"/>
  <!-- Top-left arc seam -->
  <rect x="162"  y="165" width="4"  height="6"  fill="#1c1917"/>
  <rect x="166"  y="162" width="6"  height="4"  fill="#1c1917"/>
  <rect x="172"  y="159" width="8"  height="4"  fill="#1c1917"/>
  <!-- Top-right arc seam -->
  <rect x="198"  y="162" width="6"  height="4"  fill="#1c1917"/>
  <rect x="204"  y="165" width="4"  height="6"  fill="#1c1917"/>
  <!-- Bottom-left arc seam -->
  <rect x="162"  y="199" width="4"  height="6"  fill="#1c1917"/>
  <rect x="166"  y="203" width="6"  height="4"  fill="#1c1917"/>
  <rect x="172"  y="205" width="8"  height="4"  fill="#1c1917"/>
  <!-- Bottom-right arc seam -->
  <rect x="198"  y="200" width="6"  height="4"  fill="#1c1917"/>
  <rect x="204"  y="196" width="4"  height="6"  fill="#1c1917"/>

  <!-- ── FIRE BREATH (from snout, streaming right) ── -->
  <!-- Outermost (red, semi-transparent) -->
  <rect x="198"  y="78"  width="52" height="46" fill="#ef4444" opacity="0.45"/>
  <rect x="202"  y="76"  width="46" height="50" fill="#dc2626" opacity="0.3"/>
  <!-- Orange outer -->
  <rect x="200"  y="82"  width="48" height="38" fill="#f97316"/>
  <rect x="204"  y="80"  width="44" height="42" fill="#f97316"/>
  <!-- Yellow mid flame -->
  <rect x="204"  y="86"  width="40" height="30" fill="#fbbf24"/>
  <rect x="208"  y="84"  width="36" height="34" fill="#fbbf24"/>
  <!-- Inner core (pale yellow-white) -->
  <rect x="208"  y="90"  width="28" height="22" fill="#fef08a"/>
  <rect x="212"  y="88"  width="24" height="26" fill="#fef08a"/>
  <rect x="214"  y="90"  width="20" height="22" fill="#fef9c3"/>
  <!-- Flame tip protrusions -->
  <rect x="240"  y="82"  width="10" height="8"  fill="#fbbf24"/>
  <rect x="244"  y="78"  width="8"  height="8"  fill="#fef08a"/>
  <rect x="246"  y="74"  width="6"  height="8"  fill="#fef9c3"/>
  <rect x="240"  y="108" width="10" height="8"  fill="#fbbf24"/>
  <rect x="242"  y="114" width="8"  height="6"  fill="#f97316"/>
  <!-- Second flame tendril -->
  <rect x="234"  y="76"  width="8"  height="6"  fill="#fef08a"/>
  <rect x="236"  y="70"  width="6"  height="8"  fill="#fef9c3"/>
  <rect x="232"  y="116" width="8"  height="6"  fill="#f97316"/>
  <rect x="234"  y="120" width="6"  height="8"  fill="#ef4444"/>

</svg>
