<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" shape-rendering="crispEdges">
  <!-- STREET CAT — gold badge coin format, ginger tabby -->

  <!-- Outer gold ring (layered) -->
  <circle cx="128" cy="128" r="126" fill="#78350f"/>
  <circle cx="128" cy="128" r="120" fill="#b45309"/>
  <circle cx="128" cy="128" r="114" fill="#d97706"/>
  <circle cx="128" cy="128" r="110" fill="#f59e0b"/>
  <circle cx="128" cy="128" r="106" fill="#fbbf24"/>
  <!-- Inner background (warm cream) -->
  <circle cx="128" cy="128" r="102" fill="#fef3c7"/>

  <!-- CAT EARS (before head so head covers base) -->
  <!-- Left ear outer -->
  <rect x="70" y="52" width="34" height="38" fill="#f97316"/>
  <rect x="68" y="60" width="12" height="30" fill="#f97316"/>
  <!-- Left ear inner pink -->
  <rect x="76" y="60" width="22" height="26" fill="#fb923c"/>
  <rect x="80" y="64" width="14" height="18" fill="#fca5a5"/>

  <!-- Right ear outer -->
  <rect x="152" y="52" width="34" height="38" fill="#f97316"/>
  <rect x="176" y="60" width="12" height="30" fill="#f97316"/>
  <!-- Right ear inner pink -->
  <rect x="154" y="60" width="22" height="26" fill="#fb923c"/>
  <rect x="158" y="64" width="14" height="18" fill="#fca5a5"/>

  <!-- HEAD (orange fur base) -->
  <rect x="72" y="78" width="112" height="106" fill="#f97316"/>
  <!-- Fur shading (lighter centre) -->
  <rect x="80" y="82" width="96" height="96" fill="#fb923c"/>
  <rect x="88" y="86" width="80" height="88" fill="#fdba74"/>

  <!-- Tabby forehead stripes -->
  <rect x="104" y="84" width="10" height="20" fill="#ea580c"/>
  <rect x="122" y="82" width="10" height="24" fill="#ea580c"/>
  <rect x="140" y="84" width="10" height="20" fill="#ea580c"/>

  <!-- Cheek fur puffs -->
  <rect x="72" y="130" width="20" height="28" fill="#fb923c"/>
  <rect x="164" y="130" width="20" height="28" fill="#fb923c"/>

  <!-- White muzzle area -->
  <rect x="98" y="138" width="60" height="36" fill="#fef9ee"/>
  <rect x="96" y="142" width="8" height="28" fill="#fef3c7"/>
  <rect x="152" y="142" width="8" height="28" fill="#fef3c7"/>

  <!-- LEFT EYE -->
  <!-- Socket -->
  <rect x="84" y="102" width="36" height="30" fill="#0f172a"/>
  <!-- Iris (green) -->
  <rect x="88" y="106" width="28" height="22" fill="#15803d"/>
  <rect x="90" y="106" width="24" height="22" fill="#16a34a"/>
  <!-- Pupil (vertical slit) -->
  <rect x="98" y="106" width="10" height="22" fill="#0a0a0a"/>
  <!-- Eye shine -->
  <rect x="90" y="108" width="8" height="6" fill="#86efac"/>
  <rect x="90" y="108" width="4" height="4" fill="#dcfce7"/>

  <!-- RIGHT EYE -->
  <rect x="136" y="102" width="36" height="30" fill="#0f172a"/>
  <rect x="140" y="106" width="28" height="22" fill="#15803d"/>
  <rect x="140" y="106" width="24" height="22" fill="#16a34a"/>
  <rect x="148" y="106" width="10" height="22" fill="#0a0a0a"/>
  <rect x="150" y="108" width="8" height="6" fill="#86efac"/>
  <rect x="158" y="108" width="4" height="4" fill="#dcfce7"/>

  <!-- Between eyes (bridge of nose) -->
  <rect x="120" y="108" width="16" height="20" fill="#fdba74"/>

  <!-- Nose -->
  <rect x="116" y="140" width="24" height="14" fill="#fca5a5"/>
  <rect x="118" y="142" width="20" height="10" fill="#f43f5e"/>
  <rect x="122" y="144" width="12" height="6" fill="#fb7185"/>

  <!-- Mouth -->
  <rect x="122" y="154" width="4" height="8" fill="#9a3412"/>
  <rect x="130" y="154" width="4" height="8" fill="#9a3412"/>
  <rect x="116" y="160" width="10" height="4" fill="#9a3412"/>
  <rect x="130" y="160" width="10" height="4" fill="#9a3412"/>

  <!-- LEFT WHISKERS -->
  <rect x="54" y="138" width="44" height="4" fill="#292524"/>
  <rect x="50" y="148" width="46" height="4" fill="#292524"/>
  <rect x="56" y="158" width="40" height="4" fill="#292524"/>
  <!-- Whisker dots on muzzle -->
  <rect x="96" y="140" width="4" height="4" fill="#d4d4d4"/>
  <rect x="96" y="148" width="4" height="4" fill="#d4d4d4"/>

  <!-- RIGHT WHISKERS -->
  <rect x="158" y="138" width="44" height="4" fill="#292524"/>
  <rect x="160" y="148" width="46" height="4" fill="#292524"/>
  <rect x="160" y="158" width="40" height="4" fill="#292524"/>
  <rect x="156" y="140" width="4" height="4" fill="#d4d4d4"/>
  <rect x="156" y="148" width="4" height="4" fill="#d4d4d4"/>

  <!-- Mini crown on top (like pigeon) -->
  <rect x="106" y="46" width="44" height="10" fill="#fbbf24"/>
  <rect x="106" y="38" width="10" height="10" fill="#fbbf24"/>
  <rect x="123" y="35" width="10" height="13" fill="#fbbf24"/>
  <rect x="140" y="38" width="10" height="10" fill="#fbbf24"/>
  <!-- Crown gems -->
  <rect x="108" y="40" width="6" height="6" fill="#ef4444"/>
  <rect x="125" y="37" width="6" height="6" fill="#38bdf8"/>
  <rect x="142" y="40" width="6" height="6" fill="#a855f7"/>
</svg>
