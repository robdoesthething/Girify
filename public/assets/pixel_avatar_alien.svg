<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" shape-rendering="crispEdges">
  <!-- TOURIST ALIEN — space badge coin, classic alien visiting Barcelona -->

  <!-- Outer space ring (indigo/purple) -->
  <circle cx="128" cy="128" r="126" fill="#1e1b4b"/>
  <circle cx="128" cy="128" r="120" fill="#312e81"/>
  <circle cx="128" cy="128" r="114" fill="#4338ca"/>
  <circle cx="128" cy="128" r="110" fill="#3730a3"/>
  <circle cx="128" cy="128" r="106" fill="#4f46e5"/>
  <!-- Inner space background -->
  <circle cx="128" cy="128" r="102" fill="#07060f"/>

  <!-- Stars -->
  <rect x="52" y="64" width="4" height="4" fill="#e0e7ff"/>
  <rect x="78" y="82" width="2" height="2" fill="#c7d2fe"/>
  <rect x="192" y="72" width="4" height="4" fill="#e0e7ff"/>
  <rect x="48" y="154" width="2" height="2" fill="#a5b4fc"/>
  <rect x="204" y="142" width="4" height="4" fill="#c7d2fe"/>
  <rect x="72" y="188" width="2" height="2" fill="#a5b4fc"/>
  <rect x="196" y="182" width="2" height="2" fill="#e0e7ff"/>
  <rect x="58" y="110" width="2" height="2" fill="#6366f1"/>
  <rect x="200" y="110" width="2" height="2" fill="#6366f1"/>

  <!-- UFO TOURIST HAT -->
  <!-- Dome top -->
  <rect x="96" y="52" width="64" height="8" fill="#94a3b8"/>
  <rect x="88" y="58" width="80" height="10" fill="#cbd5e1"/>
  <rect x="90" y="60" width="76" height="4" fill="#e2e8f0"/>
  <!-- Brim -->
  <rect x="68" y="66" width="120" height="10" fill="#475569"/>
  <rect x="72" y="66" width="112" height="4" fill="#64748b"/>
  <!-- Brim underside (glowing) -->
  <rect x="70" y="74" width="116" height="4" fill="#38bdf8" opacity="0.6"/>
  <!-- UFO lights on rim -->
  <rect x="78" y="66" width="8" height="8" fill="#fbbf24"/>
  <rect x="100" y="66" width="8" height="8" fill="#ef4444"/>
  <rect x="124" y="66" width="8" height="8" fill="#22c55e"/>
  <rect x="148" y="66" width="8" height="8" fill="#fbbf24"/>
  <rect x="170" y="66" width="8" height="8" fill="#38bdf8"/>

  <!-- ALIEN HEAD (large egg-shaped dome) -->
  <!-- Head outer (dark green outline) -->
  <rect x="78" y="78" width="100" height="104" fill="#166534"/>
  <rect x="82" y="74" width="92" height="12" fill="#166534"/>
  <rect x="72" y="88" width="12" height="80" fill="#166534"/>
  <rect x="172" y="88" width="12" height="80" fill="#166534"/>
  <!-- Head body (bright green) -->
  <rect x="82" y="82" width="92" height="96" fill="#4ade80"/>
  <rect x="86" y="78" width="84" height="10" fill="#4ade80"/>
  <rect x="76" y="90" width="10" height="76" fill="#4ade80"/>
  <rect x="170" y="90" width="10" height="76" fill="#4ade80"/>
  <!-- Highlight (light green top-left) -->
  <rect x="86" y="82" width="38" height="36" fill="#86efac"/>
  <rect x="86" y="82" width="18" height="18" fill="#bbf7d0"/>
  <!-- Shadow (right side) -->
  <rect x="162" y="88" width="12" height="80" fill="#22c55e"/>
  <rect x="154" y="92" width="14" height="70" fill="#16a34a" opacity="0.5"/>

  <!-- LEFT EYE (large almond, classic alien) -->
  <!-- Eye socket deep -->
  <rect x="84" y="106" width="42" height="32" fill="#020617"/>
  <rect x="82" y="108" width="10" height="28" fill="#020617"/>
  <!-- Eye (very dark with sheen) -->
  <rect x="86" y="108" width="38" height="28" fill="#0a0818"/>
  <rect x="84" y="110" width="6" height="24" fill="#0d0b2a"/>
  <!-- Blue-violet sheen (top) -->
  <rect x="88" y="110" width="28" height="10" fill="#312e81"/>
  <rect x="88" y="110" width="18" height="6" fill="#4338ca"/>
  <!-- Specular highlights -->
  <rect x="90" y="112" width="12" height="8" fill="#6366f1"/>
  <rect x="90" y="112" width="6" height="4" fill="#a5b4fc"/>
  <rect x="96" y="112" width="4" height="2" fill="#e0e7ff"/>

  <!-- RIGHT EYE -->
  <rect x="130" y="106" width="42" height="32" fill="#020617"/>
  <rect x="168" y="108" width="10" height="28" fill="#020617"/>
  <rect x="132" y="108" width="38" height="28" fill="#0a0818"/>
  <rect x="170" y="110" width="6" height="24" fill="#0d0b2a"/>
  <rect x="136" y="110" width="28" height="10" fill="#312e81"/>
  <rect x="146" y="110" width="18" height="6" fill="#4338ca"/>
  <rect x="148" y="112" width="12" height="8" fill="#6366f1"/>
  <rect x="154" y="112" width="6" height="4" fill="#a5b4fc"/>
  <rect x="154" y="112" width="4" height="2" fill="#e0e7ff"/>

  <!-- Nostril dots -->
  <rect x="120" y="146" width="6" height="4" fill="#166534"/>
  <rect x="130" y="146" width="6" height="4" fill="#166534"/>

  <!-- Thin alien mouth -->
  <rect x="104" y="156" width="48" height="4" fill="#166534"/>
  <rect x="104" y="160" width="4" height="6" fill="#166534"/>
  <rect x="148" y="160" width="4" height="6" fill="#166534"/>

  <!-- Chin narrow -->
  <rect x="96" y="162" width="64" height="12" fill="#4ade80"/>
  <rect x="102" y="172" width="52" height="8" fill="#22c55e"/>
  <rect x="110" y="178" width="36" height="4" fill="#166534"/>

  <!-- Neck -->
  <rect x="112" y="182" width="32" height="16" fill="#4ade80"/>
  <rect x="116" y="190" width="24" height="8" fill="#22c55e"/>

  <!-- Tourist camera (slung around neck) -->
  <rect x="100" y="196" width="56" height="4" fill="#475569"/>
  <!-- Camera body -->
  <rect x="114" y="198" width="28" height="20" fill="#1e293b"/>
  <rect x="116" y="200" width="24" height="16" fill="#334155"/>
  <!-- Lens -->
  <rect x="119" y="203" width="14" height="10" fill="#0f172a"/>
  <rect x="121" y="205" width="10" height="6" fill="#38bdf8"/>
  <rect x="122" y="206" width="4" height="4" fill="#7dd3fc"/>
  <!-- Shutter button -->
  <rect x="134" y="200" width="6" height="4" fill="#ef4444"/>
</svg>
