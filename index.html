<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon2.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://overpass-api.de https://*.openstreetmap.org https://*.supabase.co https://*.upstash.io https://*.sentry.io https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com" />
  <meta name="description"
    content="Girify is a free daily geography quiz about Barcelona streets. Identify highlighted streets on an interactive map, earn points, climb the leaderboard, and unlock badges. A new challenge every 24 hours." />
  <meta name="keywords" content="Barcelona streets quiz, geography game, Barcelona map game, daily quiz, Spain travel, Girify" />
  <link rel="canonical" href="https://girify.vercel.app/" />
  <link rel="preconnect" href="%VITE_SUPABASE_URL%" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="image" href="/images/guiri_invasion.webp">
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet">
  </noscript>
  <title>Girify — Daily Barcelona Streets Quiz</title>
</head>

<body>
  <!-- Inline shell: text visible immediately as FCP, replaced by React on mount -->
  <div id="root">
    <style>@keyframes _lb{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}</style>
    <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020617;gap:1.5rem;">
      <span style="font-size:1.5rem;font-weight:700;color:#f8fafc;letter-spacing:-0.02em;font-family:system-ui,sans-serif;">Girify</span>
      <div style="width:10rem;height:0.25rem;border-radius:9999px;background:#1e293b;overflow:hidden;">
        <div style="height:100%;background:#0ea5e9;border-radius:9999px;animation:_lb 1.4s ease-in-out infinite;"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
